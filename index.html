<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesium solo mis volumenes</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div class="panel">
    Solo mis volumenes
  </div>

  <script type="module">
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3MTkzNGE1OC1kZTAyLTQzODYtOGVhZC0yMDc0MjJmMTljZDMiLCJpZCI6MzMwNTcwLCJpYXQiOjE3NzM5NTQ0NTR9.gRPhm9X5re8jI6xmnpnx9tHBwOJ_kl41TgivIHR9NBU";

    const viewer = new Cesium.Viewer("cesiumContainer", {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      baseLayerPicker: true,
      animation: false,
      timeline: false
    });

    viewer.shadows = false;
    viewer.scene.globe.enableLighting = false;
    viewer.scene.fog.enabled = false;
    viewer.scene.skyAtmosphere.show = false;

    // Tus 3 modelos
    const modelo1 = await Cesium.Cesium3DTileset.fromIonAssetId(4547625);
    const modelo2 = await Cesium.Cesium3DTileset.fromIonAssetId(4547624);
    const modelo3 = await Cesium.Cesium3DTileset.fromIonAssetId(4547623);

    viewer.scene.primitives.add(modelo1);
    viewer.scene.primitives.add(modelo2);
    viewer.scene.primitives.add(modelo3);

    // Ir a tus modelos
    await viewer.zoomTo(modelo1);
  </script>
</body>
</html>
